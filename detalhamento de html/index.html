<!DOCTYPE html> <!--declaração do tipo de documento, indicando que é um arquivo HTML5-->
<html lang="en"> <!--elemento raiz do documento HTML, com o atributo "lang" indicando o idioma da página (inglês)-->
<head> <!--meta dados e informações invisíveis ao usuário-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body> <!--conteúdo visível ao usuário-->
   <header> 
    <!--elemento de cabeçalho, geralmente usado para conter o título principal da página-->
   </header>  

   <main>
    <!--corpo do site, elemento principal do conteúdo da página, onde o conteúdo principal é colocado-->

    <h1> <!-- pode conter somente 1 h1 por pagina--></h1>
    <h2><!-- utilizado para subtitulos. pode conter múltiplos h2 por página--></h2>
    <h3><!-- utilizado para subtitulos de menor hierarquia. pode conter múltiplos h3 por página--></h3>
    <div><!-- elemento de conteúdo, geralmente usado para agrupar elementos HTML --></div>
    <p><!-- elemento de parágrafo, usado para conter texto corrido --></p>
    <img src="" alt=""><!-- elemento de imagem, usado para exibir imagens -->
   
    <link rel="stylesheet" href="<!-- elemento de link, usado para vincular arquivos externos, como folhas de estilo CSS --></link>">
   </main>

    <footer>
     <!--elemento de rodapé, geralmente usado para conter informações de copyright, links de contato, etc.-->       
    
</body>
</html>
